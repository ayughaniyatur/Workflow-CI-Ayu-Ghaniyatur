name: MLflow CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  train-model:

    runs-on: ubuntu-latest

    steps:

    # Run actions/checkout@v3
    - name: Checkout Repository
      uses: actions/checkout@v3

    # Set up Python 3.12.7
    - name: Set Up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    # Check env
    - name: Check Environment
      run: |
        python --version
        pip --version

    # Install dependencies
    - name: Install Dependencies
      run: |
        pip install mlflow==2.19.0
        pip install pandas
        pip install scikit-learn

    # Run mlflow project
    - name: Run MLflow Project
      run: |
        mlflow run MLProject --env-manager local

    # Get latest MLflow run_id
    - name: Get Latest MLflow Run ID
      run: |
        echo "Run completed"

    # Install Python dependencies
    - name: Install Python Dependencies
      run: |
        pip install mlflow

    # Upload to GitHub
    - name: Upload MLflow Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mlruns
        path: mlruns/

    # Build Docker Model
    - name: Build Docker Model
      run: |
        docker build -t customer-churn-model ./MLProject

    # Log in to Docker Hub
    - name: Log In To Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Tag Docker Image
    - name: Tag Docker Image
      run: |
        docker tag customer-churn-model ayughaniya05/customer-churn-model:latest

    # Push Docker Image
    - name: Push Docker Image
      run: |
        docker push ayughaniya05/customer-churn-model:latest