name: MLflow CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  train-model:

    runs-on: ubuntu-latest

    steps:

      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Set Up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Check Environment
      - name: Check Environment
        run: |
          python --version
          pip --version

      # Install Dependencies
      - name: Install Dependencies
        run: |
          pip install mlflow==2.19.0
          pip install pandas
          pip install scikit-learn

      # Run MLflow Project
      - name: Run MLflow Project
        run: |
          mlflow run MLProject --env-manager local

      # Get Latest Run ID
      - name: Get Latest MLflow Run ID
        run: |
          echo "Latest run completed"

      # Upload Artifacts
      - name: Upload MLflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: mlruns/

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t customer-churn-model ./MLProject

      # Login Docker Hub
      - name: Log In To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Tag Docker Image
      - name: Tag Docker Image
        run: |
          docker tag customer-churn-model ayughaniya05/customer-churn-model:latest

      # Push Docker Image
      - name: Push Docker Image
        run: |
          docker push ayughaniya05/customer-churn-model:latest